<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caderno de Desenho — do Boneco Palito à Mona Lisa</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand"><div class="logo"></div> Caderno de Desenho <span class="badge">MVP</span></div>
      <div class="sep"></div>
      <div class="toolbar" role="toolbar" aria-label="Ferramentas de desenho">
        <div class="seg" id="toolSeg">
          <button data-tool="pen" class="active" title="Caneta (P)">✏️<span class="sr-only">Caneta</span></button>
          <button data-tool="eraser" title="Borracha (E)">🩹<span class="sr-only">Borracha</span></button>
        </div>
        <label class="pill"> Cor <input type="color" id="color" value="#ffffff" /></label>
        <label class="pill"> Espessura <input type="range" id="size" min="1" max="48" value="6" /></label>
        <label class="pill"> Opacidade <input type="range" id="alpha" min="0.1" max="1" step="0.05" value="1" /></label>
        <button id="undo" title="Desfazer (Ctrl+Z)">↶ Desfazer</button>
        <button id="redo" title="Refazer (Ctrl+Shift+Z)">↷ Refazer</button>
        <button id="clear" title="Limpar">🧼 Limpar</button>
        <button id="save" title="Salvar PNG">💾 Salvar</button>
        <div class="sep"></div>
        <div class="seg">
          <button id="toggleGrid" title="Grade"># Grade</button>
          <button id="toggleNotebook" class="active" title="Fundo de caderno">📓 Caderno</button>
          <button id="toggleGuides" class="active" title="Guias do nível">👻 Guias</button>
        </div>
      </div>
      <div style="margin-left:auto" class="hint">Dica: segure <span class="kbd">Shift</span> para linha reta • <span class="kbd">S</span> salva • <span class="kbd">G</span> liga/desliga Guias</div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <h2>Níveis de dificuldade</h2>
      <div id="levels"></div>
      <div class="prompt" id="prompt">Escolha um nível para ver o desafio e as guias de desenho ✨</div>
      <div class="links">
        <a class="link" href="#" id="exportProject">Exportar rascunho (JSON)</a>
        <a class="link" href="#" id="importProject">Importar rascunho</a>
        <a class="link" href="#" id="resetData">Zerar tudo</a>
      </div>
    </aside>

    <!-- BOARD -->
    <main class="board">
      <div class="canvas-wrap">
        <canvas id="notebook"></canvas>
        <canvas id="guides"></canvas>
        <canvas id="paper"></canvas>
      </div>
      <div class="statusbar">
        <div class="left">
          <div id="status">Pronto para desenhar.</div>
        </div>
        <div class="right">
          <div id="saveState" class="badge">Auto-save: ativo</div>
        </div>
      </div>
    </main>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
